{% extends 'base.html' %}
{% block content %}
<div class="blog-detail-wrapper">
  <section class="section-card" style="max-width: 1000px; margin: 0 auto;">
    <div style="margin-bottom: 1.5rem;">
      <a href="{% url 'home' %}" style="display: inline-flex; align-items: center; gap: 0.5rem; color: #B9FFB9; text-decoration: none; font-weight: 500; transition: all 0.3s;" onmouseover="this.style.textShadow='0 0 10px rgba(0,255,65,0.4)'" onmouseout="this.style.textShadow='none'" onfocus="this.style.textShadow='0 0 10px rgba(0,255,65,0.4)'" onblur="this.style.textShadow='none'">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>
    <h2>{{ post.title }}</h2>
    <p style="color:#9fb0c1">{{ post.created|date:'M d, Y' }}</p>
    {% if post.cover %}<img src="{{ post.cover.url }}" alt="cover" style="max-width:100%;border-radius:8px;margin:1rem 0">{% endif %}
    <div style="color:#d1dbe8; line-height: 1.8;">{{ post.content|safe }}</div>
    {% if post.images.all %}
      <div style="display:flex;flex-wrap:wrap;gap:8px;margin-top:1rem;">
        {% for img in post.images.all %}
          <img src="{{ img.image.url }}" alt="{{ post.title }} related visual" style="width:180px;height:120px;object-fit:cover;border-radius:6px;"/>
        {% endfor %}
      </div>
    {% endif %}
  </section>
</div>

<style>
  /* Blog detail wrapper with full-width background */
  .blog-detail-wrapper {
    background: rgba(0, 255, 65, 0.03);
    backdrop-filter: blur(10px);
    padding: 3rem 2rem;
    margin: 0;
    position: relative;
    left: 50%;
    right: 50%;
    margin-left: -50vw;
    margin-right: -50vw;
    width: 100vw;
  }
  
  /* Rich content styling for blog */
  .section-card h1,
  .section-card h2,
  .section-card h3,
  .section-card h4,
  .section-card h5,
  .section-card h6 {
    color: #00FF41;
    text-shadow: 0 0 10px rgba(0, 255, 65, 0.4);
    margin-top: 1.5rem;
    margin-bottom: 0.75rem;
  }
  
  .section-card strong {
    color: #B9FFB9;
    font-weight: 600;
  }
  
  .section-card em,
  .section-card i {
    color: #B9FFB9;
    font-style: italic;
  }
  
  .section-card code {
    background: #00FF41;
    padding: 0.2rem 0.5rem;
    border-radius: 4px;
    font-family: 'Courier New', monospace;
    color: #0D1117;
  }
  
  .section-card pre {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(0, 255, 65, 0.2);
    border-radius: 8px;
    padding: 1rem;
    overflow-x: auto;
    margin: 1rem 0;
  }
  
  .section-card pre code {
    background: none;
    padding: 0;
    color: #00FF41;
  }
  
  .section-card blockquote {
    border-left: 4px solid #00FF41;
    padding-left: 1rem;
    margin: 1rem 0;
    color: #B9FFB9;
    font-style: italic;
  }
  
  .section-card ul,
  .section-card ol {
    margin: 1rem 0;
    padding-left: 2rem;
  }
  
  .section-card li {
    margin: 0.5rem 0;
    color: #B9FFB9;
  }
  
  .section-card a {
    color: #B9FFB9;
    text-decoration: underline;
    transition: all 0.3s;
  }
  
  .section-card a:hover {
    text-shadow: 0 0 8px rgba(0, 255, 65, 0.4);
  }
  
  .section-card table {
    width: 100%;
    border-collapse: collapse;
    margin: 1rem 0;
  }
  
  .section-card table th {
    background: #00FF41;
    border: 1px solid rgba(0, 255, 65, 0.2);
    padding: 0.75rem;
    text-align: left;
    color: #0D1117;
  }
  
  .section-card table td {
    border: 1px solid rgba(0, 255, 65, 0.2);
    padding: 0.75rem;
    color: #B9FFB9;
  }
  
  /* Mobile responsive adjustments */
  @media (max-width: 768px) {
    .blog-detail-wrapper {
      padding: 2rem 1rem;
    }
    
    .section-card h1,
    .section-card h2,
    .section-card h3 {
      font-size: 1.3rem;
    }
    
    .section-card pre {
      font-size: 12px;
      padding: 0.75rem;
    }
    
    .section-card table {
      font-size: 0.9rem;
    }
    
    .section-card table th,
    .section-card table td {
      padding: 0.5rem;
    }
  }
  
  @media (max-width: 600px) {
    .blog-detail-wrapper {
      padding: 1.5rem 0.75rem;
    }
    
    .section-card {
      padding: 1.5rem !important;
    }
    
    .section-card h1,
    .section-card h2 {
      font-size: 1.2rem;
    }
    
    .section-card h3, 
    .section-card h4 {
      font-size: 1.1rem;
    }
    
    .section-card pre {
      font-size: 11px;
      padding: 0.5rem;
      overflow-x: scroll;
    }
    
    .section-card code {
      font-size: 0.9rem;
    }
    
    .section-card table {
      font-size: 0.85rem;
      display: block;
      overflow-x: auto;
    }
  }
  
  @media (max-width: 400px) {
    .blog-detail-wrapper {
      padding: 1rem 0.5rem;
    }
    
    .section-card {
      padding: 1rem !important;
    }
    
    .section-card h1,
    .section-card h2 {
      font-size: 1.1rem;
    }
    
    .section-card pre {
      font-size: 10px;
    }
  }
</style>
{% endblock %}
