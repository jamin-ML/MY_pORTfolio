{% extends 'base.html' %}

{% block content %}
<div style="max-width: 480px; margin: 4rem auto; padding: 2rem; background: rgba(0,255,65,0.05); border: 1px solid rgba(0,255,65,0.2); border-radius: 10px;">
  <h1 style="color: #00FF41; margin-bottom: 1.5rem;">Dashboard Login</h1>

  {% if form.errors %}
  <div style="margin-bottom: 1rem; padding: 0.8rem; background: rgba(220,53,69,0.25); border: 1px solid #dc3545; border-radius: 6px; color: #ffe6ea;">
    Invalid username or password.
  </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div style="margin-bottom: 1rem;">
      <label for="id_username" style="display:block; margin-bottom: 0.4rem; color:#B9FFB9;">Username</label>
      <input id="id_username" name="username" type="text" required style="width:100%; padding:0.8rem; background:#111; border:1px solid rgba(0,255,65,0.2); border-radius:6px; color:#fff;">
    </div>

    <div style="margin-bottom: 1.2rem;">
      <label for="id_password" style="display:block; margin-bottom: 0.4rem; color:#B9FFB9;">Password</label>
      <input id="id_password" name="password" type="password" required style="width:100%; padding:0.8rem; background:#111; border:1px solid rgba(0,255,65,0.2); border-radius:6px; color:#fff;">
    </div>

    {% if next %}
    <input type="hidden" name="next" value="{{ next }}">
    {% endif %}

    <button type="submit" style="background:#00FF41; color:#0D1117; border:0; border-radius:6px; padding:0.8rem 1.2rem; font-weight:700; cursor:pointer;">
      Login
    </button>
  </form>
</div>
{% endblock %}
