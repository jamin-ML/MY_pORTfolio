<div id="blog" class="page">
    <h1 style="color: #00ff00; margin-bottom: 2rem;">Blog Posts</h1>
    {% if posts %}
    <div class="card-container">
        {% for post in posts %}
        <div class="blog-card">
            <div class="blog-image">
                {% if post.cover %}
                <img src="{{ post.cover.url }}" alt="{{ post.title }}" style="width: 100%; height: 100%; object-fit: cover;">
                {% else %}
                📝
                {% endif %}
            </div>
            <div class="blog-content">
                <div class="blog-date">{{ post.created|date:'M d, Y' }}</div>
                <div class="blog-title">{{ post.title }}</div>
                <div class="blog-excerpt">{{ post.content|truncatewords:30 }}</div>
                <a href="{% url 'blog_detail' post.slug %}" class="read-more">Read More →</a>
            </div>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div style="padding: 2rem; text-align: center; background: rgba(0,0,0,0.45); border: 1px solid rgba(0,255,65,0.25); border-radius: 8px; color: #E6FFE6;">
        <p>No blog posts yet. Check back soon!</p>
    </div>
    {% endif %}
</div>
