            <h2 style="color: #00ff00; margin-bottom: 1.5rem;">Send a Message</h2>
            <form style="background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,0,0.2); border-radius: 10px; padding: 2rem;">
                <div style="margin-bottom: 1rem;">
                    <label for="contactName" style="display: block; margin-bottom: 0.5rem; color: #00ff00;">Name</label>
                    <input id="contactName" name="name" type="text" style="width: 100%; padding: 0.8rem; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px;">

                <div style="margin-bottom: 1rem;">

                </div>
                <div style="margin-bottom: 1rem;">
                    <label for="contactMessage" style="display: block; margin-bottom: 0.5rem; color: #00ff00;">Message</label>
                    <textarea id="contactMessage" name="message" rows="5" style="width: 100%; padding: 0.8rem; background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 5px;"></textarea>
                </div>
                <button type="submit" style="background: #00ff00; color: #0a0a0a; padding: 1rem 2rem; border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">Send Message</button>
